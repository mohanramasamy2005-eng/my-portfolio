
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simple 40-line Page</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:2rem;background:#f7f9fc;color:#102a43}
.card{background:#fff;border-radius:8px;padding:1rem;margin:1rem 0;box-shadow:0 2px 6px rgba(16,42,67,0.07)}
h1{font-size:1.25rem;margin:0 0 .5rem}
ul{padding-left:1.2rem}
li{margin:.25rem 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
.badge{display:inline-block;background:#e6f0ff;color:#084298;padding:.25rem .5rem;border-radius:999px;font-size:.75rem}
</style></head>
<body>
<div class="card">
<h1>Simple 40-line Examples</h1>
<p class="badge">Demo</p>
<div class="grid">
<div>
<h2>List</h2>
<ul>
<li>Quick HTML sample</li>
<li>Small CSS styles</li>
<li>Responsive grid</li>
</ul>
</div>
<div>
<h2>Info</h2>
<ul>
<li>40 lines total</li>
<li>Accessible and minimal</li>
<li>Easy to customize</li>
</ul>
</div>
</div>
</div>
</body>
</html>
